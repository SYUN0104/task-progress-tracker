name: Deploy Web (dev)

# Web preview pipeline: every push to `dev` builds the browser version
# (localStorage adapter, no Tauri) and deploys it to GitHub Pages so
# changes can be checked in a browser immediately. Releases still come
# from `main` via release.yml (tag push -> Windows exe).
on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build web version
        run: npm run build
        env:
          VITE_BASE: /task-progress-tracker/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
