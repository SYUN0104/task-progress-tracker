name: Release

# Tag pushes (v*) build the Windows installer and publish it to a GitHub
# Release. workflow_dispatch lets us dry-run the same build and inspect the
# resulting .exe as a workflow artifact without cutting a release (Phase 1
# pipeline validation, see plan Phase 1 step 2).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      # Tag push: build the NSIS installer and publish a GitHub Release.
      # tauri-action drives `beforeBuildCommand` (vite build) internally.
      - name: Build and publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri/app
          tagName: ${{ github.ref_name }}
          releaseName: 'Task Progress Tracker ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false

      # workflow_dispatch: build only, no Release is created. Uses the same
      # `tauri build` invocation as the tag path via our npm script.
      - name: Build only (manual dry run)
        if: github.event_name == 'workflow_dispatch'
        run: npm run tauri:build

      - name: Upload build as workflow artifact (manual dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: task-progress-tracker-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
